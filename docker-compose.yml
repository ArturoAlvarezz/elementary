version: '3.8'

services:
  elementary:
    image: arturoalvarezz/elementary:latest
    container_name: elementary
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3012:80"
    networks:
      - traefik-public
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.elementary.rule=Host(`elementary.arturoalvarez.site`)"
      - "traefik.http.routers.elementary.entrypoints=websecure"
      - "traefik.http.routers.elementary.tls.certresolver=cloudflare"
      - "traefik.http.services.elementary.loadbalancer.server.port=80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

networks:
  traefik-public:
    external: true
